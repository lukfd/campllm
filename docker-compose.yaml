services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: campllm-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - CHROMA_URI=http://chroma:8000
    depends_on:
      - chroma
    restart: unless-stopped
  chroma:
    image: chromadb/chroma:latest
    container_name: campllm-chroma
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ./chroma-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
