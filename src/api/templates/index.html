<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampLLM</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-white text-gray-900">
    <div id="app" class="mx-auto flex min-h-screen max-w-3xl flex-col p-4">
        <h1 class="text-2xl font-semibold">CampLLM <span class="text-sm font-normal text-blue-500 pl-4">[[ model ]]</span></h1>
        <p class="mt-1 text-sm text-gray-500">Chat with the CampLLM RAG system. Ask questions about Minnesota state parks <img src="https://cdn3.emoji.gg/emojis/98422-minnesota.png" alt="Minnesota" class="inline-block h-[2.25em] w-auto pl-4"></p>

        <div class="mt-4 flex flex-1 flex-col rounded border bg-gray-100">
            <div id="chat-history" class="flex-1 overflow-y-auto p-4">
                <div v-for="message in messages" :class="message.sender === 'user' ? 'text-right' : ''">
                    <div class="mb-3 inline-block max-w-[85%] rounded border bg-white px-3 py-2 text-sm" :class="message.sender === 'user' ? 'bg-gray-50' : (message.type === 'error' ? 'bg-red-50' : '')">
                        <div class="text-xs text-gray-500">[[ message.prefix ]]</div>
                        <div v-if="message.html" v-html="message.html"></div>
                        <div v-else>[[ message.text ]]</div>
                    </div>
                </div>
                <div id="chat-end"></div>
            </div>

            <div class="border-t p-3">
                <div class="flex gap-2">
                    <input type="text" v-model="question" @keyup.enter="askQuestion" placeholder="Ask a question about parks..." class="flex-1 rounded border px-3 py-2">
                    <button @click="askQuestion" class="rounded bg-gray-800 px-4 py-2 text-white">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="static/chat.js"></script>
</body>

</html>
