<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampLLM RAG</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: white;
            margin: 0;
            padding: 2%;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 80%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1% 0;
        }
        #input-area {
            display: flex;
            padding: 1% 0;
        }
        input {
            flex-grow: 1;
            padding: 1.5%;
            font-size: 1.1em;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #eeeeee;
        }
        button {
            padding: 1% 2%;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            margin-left: 1%;
            cursor: pointer;
        }
        .user-message {
            text-align: right;
            margin-bottom: 1%;
        }
        .bot-message {
            text-align: left;
            margin-bottom: 1%;
            color: #333;
            white-space: pre-wrap; /* This will respect newlines */
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>CampLLM RAG</h1>
        <div id="chat-history">
            <div v-for="message in messages" :class="message.sender === 'user' ? 'user-message' : 'bot-message'">
                <b>[[ message.prefix ]]</b> [[ message.text ]]
            </div>
        </div>
        <div id="input-area">
            <input type="text" v-model="question" @keyup.enter="askQuestion" placeholder="Ask a question about parks...">
            <button @click="askQuestion">Send</button>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue

        createApp({
            delimiters: ['[[', ']]'],
            setup() {
                const question = ref('');
                const messages = ref([]);

                async function askQuestion() {
                    if (!question.value) return;

                    const currentQuestion = question.value;
                    messages.value.push({ sender: 'user', prefix: 'You:', text: currentQuestion });
                    question.value = '';

                    await nextTick();
                    const chatHistory = document.getElementById('chat-history');
                    chatHistory.scrollTop = chatHistory.scrollHeight;

                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ question: currentQuestion }),
                    });

                    const data = await response.json();
                    let botText = data.answer;
                    if (data.sources && data.sources.length > 0) {
                        botText += "\n\nSources:\n";
                        data.sources.forEach(source => {
                            botText += `- ${source.park_name}: ${source.section_heading} (${source.section_url})\n`;
                        });
                    }
                    messages.value.push({ sender: 'bot', prefix: 'Bot:', text: botText });

                    await nextTick();
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }

                return {
                    question,
                    messages,
                    askQuestion
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
