<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampLLM RAG</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: white;
            margin: 0;
            padding: 2%;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 80%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }
        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1% 0;
        }
        #input-area {
            display: flex;
            padding: 1% 0;
        }
        input {
            flex-grow: 1;
            padding: 1.5%;
            font-size: 1.1em;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #eeeeee;
        }
        button {
            padding: 1% 2%;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            margin-left: 1%;
            cursor: pointer;
        }
        .user-message {
            text-align: right;
            margin-bottom: 1%;
        }
        .bot-message {
            text-align: left;
            margin-bottom: 1%;
            color: #333;
            white-space: pre-wrap; /* This will respect newlines */
        }
        .error-message {
            text-align: left;
            margin-bottom: 1%;
            color: #7a0b0b;
            background-color: #fff4f4;
            border-left: 4px solid #f44336;
            padding: 8px 12px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>CampLLM RAG</h1>
        <div id="chat-history">
            <div v-for="message in messages" :class="message.sender === 'user' ? 'user-message' : (message.type === 'error' ? 'error-message' : 'bot-message')">
                <b>[[ message.prefix ]]</b>
                <template v-if="message.html">
                    <div v-html="message.html"></div>
                </template>
                <template v-else>
                    [[ message.text ]]
                </template>
            </div>
        </div>
        <div id="input-area">
            <input type="text" v-model="question" @keyup.enter="askQuestion" placeholder="Ask a question about parks...">
            <button @click="askQuestion">Send</button>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick } = Vue

        createApp({
            delimiters: ['[[', ']]'],
            setup() {
                const question = ref('');
                const messages = ref([]);

                async function askQuestion() {
                    if (!question.value) return;

                    const currentQuestion = question.value;
                    messages.value.push({ sender: 'user', prefix: 'You:', text: currentQuestion });
                    question.value = '';

                    await nextTick();
                    const chatHistory = document.getElementById('chat-history');
                    chatHistory.scrollTop = chatHistory.scrollHeight;

                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ question: currentQuestion }),
                    });

                    let botText = '';
                    let botHtml = '';
                    try {
                        if (!response.ok) {
                            // Try to extract useful error information from JSON or text
                            let errText = '';
                            try {
                                const errJson = await response.json();
                                errText = errJson.detail || errJson.message || JSON.stringify(errJson);
                            } catch (e) {
                                errText = await response.text();
                            }
                            botText = `Error ${response.status}: ${errText || response.statusText}`;
                            const raw = (typeof marked !== 'undefined') ? marked.parse(botText) : botText.replace(/\n/g, '<br>');
                            botHtml = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(raw) : raw;
                            messages.value.push({ sender: 'bot', prefix: 'Error:', text: botText, html: botHtml, type: 'error' });
                            return;
                        }

                        const data = await response.json();
                        botText = data.answer || '';
                        if (data.sources && data.sources.length > 0) {
                            botText += "\n\nSources:\n";
                            data.sources.forEach(source => {
                                botText += `- ${source.park_name}: ${source.section_heading} (${source.section_url})\n`;
                            });
                        }

                        // Convert Markdown to HTML and sanitize it before inserting
                        const raw = (typeof marked !== 'undefined') ? marked.parse(botText) : botText.replace(/\n/g, '<br>');
                        botHtml = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(raw) : raw;
                        messages.value.push({ sender: 'bot', prefix: 'Bot:', text: botText, html: botHtml });

                    } catch (err) {
                        // Network or unexpected error
                        botText = `Network error: ${err.message || String(err)}`;
                        const raw = (typeof marked !== 'undefined') ? marked.parse(botText) : botText.replace(/\n/g, '<br>');
                        botHtml = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(raw) : raw;
                        messages.value.push({ sender: 'bot', prefix: 'Error:', text: botText, html: botHtml, type: 'error' });
                    }

                    await nextTick();
                    chatHistory.scrollTop = chatHistory.scrollHeight;
                }

                return {
                    question,
                    messages,
                    askQuestion
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
